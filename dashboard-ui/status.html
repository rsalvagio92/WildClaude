<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WildClaude — Secondary Node</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; color: #e5e7eb; font-family: 'Inter', system-ui, sans-serif; }
    .bar { height: 6px; border-radius: 3px; background: #1f2937; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="max-w-lg w-full space-y-4">

    <!-- Header -->
    <div class="text-center space-y-1 mb-6">
      <div class="text-3xl">🐺</div>
      <h1 class="text-xl font-semibold">WildClaude</h1>
      <p class="text-sm text-gray-400">Secondary Node</p>
    </div>

    <!-- Identity card -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-3">
      <div class="flex items-center justify-between">
        <span class="text-xs text-gray-500 uppercase tracking-wider">Machine</span>
        <span id="machine-id" class="font-mono text-sm bg-gray-800 px-2 py-0.5 rounded">loading…</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xs text-gray-500 uppercase tracking-wider">Status</span>
        <span id="status-badge" class="px-2 py-0.5 text-xs rounded pulse bg-green-900 text-green-300">online</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xs text-gray-500 uppercase tracking-wider">Version</span>
        <span id="version" class="text-sm text-gray-300">—</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xs text-gray-500 uppercase tracking-wider">Primary</span>
        <a id="primary-link" href="#" class="text-sm text-blue-400 hover:underline">—</a>
      </div>
    </div>

    <!-- System stats -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-3">
      <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">System</p>

      <div class="space-y-1">
        <div class="flex justify-between text-xs">
          <span class="text-gray-400">CPU</span>
          <span id="cpu-text" class="text-gray-200">—</span>
        </div>
        <div class="bar"><div id="cpu-bar" class="bar-fill bg-blue-500" style="width:0%"></div></div>
      </div>

      <div class="space-y-1">
        <div class="flex justify-between text-xs">
          <span class="text-gray-400">RAM</span>
          <span id="ram-text" class="text-gray-200">—</span>
        </div>
        <div class="bar"><div id="ram-bar" class="bar-fill bg-purple-500" style="width:0%"></div></div>
      </div>

      <div class="space-y-1">
        <div class="flex justify-between text-xs">
          <span class="text-gray-400">Disk</span>
          <span id="disk-text" class="text-gray-200">—</span>
        </div>
        <div class="bar"><div id="disk-bar" class="bar-fill bg-yellow-500" style="width:0%"></div></div>
      </div>

      <div class="flex justify-between text-xs mt-1">
        <span class="text-gray-400">Uptime</span>
        <span id="uptime" class="text-gray-200">—</span>
      </div>
    </div>

    <!-- Memories + last heartbeat -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex justify-between text-sm">
      <div>
        <p class="text-xs text-gray-500 mb-1">Memories</p>
        <p id="mem-count" class="text-gray-100 font-mono">—</p>
      </div>
      <div class="text-right">
        <p class="text-xs text-gray-500 mb-1">Last sync</p>
        <p id="last-sync" class="text-gray-100 font-mono">—</p>
      </div>
    </div>

    <p class="text-xs text-center text-gray-600">Full dashboard available on the <a id="primary-dash-link" href="#" class="text-blue-500 hover:underline">primary node</a>. Auto-refresh every 30s.</p>
  </div>

  <script>
    const token = sessionStorage.getItem('wc_token') || '';

    async function load() {
      try {
        const res = await fetch('/api/node-status', {
          headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        });
        if (res.status === 401) {
          const t = prompt('Dashboard token:');
          if (t) { sessionStorage.setItem('wc_token', t); load(); }
          return;
        }
        const d = await res.json();

        document.getElementById('machine-id').textContent = d.machineId || '?';
        document.getElementById('version').textContent = d.version || '?';

        const pl = d.primaryUrl ? `http://${d.primaryUrl}` : '#';
        document.getElementById('primary-link').textContent = d.primaryUrl || '—';
        document.getElementById('primary-link').href = pl;
        document.getElementById('primary-dash-link').href = pl;

        if (d.telemetry) {
          const t = d.telemetry;
          const cpu = Math.round(t.cpuPercent ?? 0);
          document.getElementById('cpu-text').textContent = `${cpu}%`;
          document.getElementById('cpu-bar').style.width = `${cpu}%`;

          if (t.ramTotal) {
            const ramPct = Math.round((t.ramUsed / t.ramTotal) * 100);
            document.getElementById('ram-text').textContent = `${t.ramUsed} / ${t.ramTotal} MB (${ramPct}%)`;
            document.getElementById('ram-bar').style.width = `${ramPct}%`;
          }

          if (t.diskTotal) {
            const dPct = Math.round((t.diskUsed / t.diskTotal) * 100);
            document.getElementById('disk-text').textContent = `${t.diskUsed} / ${t.diskTotal} MB (${dPct}%)`;
            document.getElementById('disk-bar').style.width = `${dPct}%`;
          }

          if (t.uptime != null) {
            const u = t.uptime;
            const h = Math.floor(u / 3600), m = Math.floor((u % 3600) / 60);
            document.getElementById('uptime').textContent = `${h}h ${m}m`;
          }
        }

        document.getElementById('mem-count').textContent = d.memoryCount ?? '—';
        document.getElementById('last-sync').textContent = d.lastSyncAgo || '—';
      } catch (e) {
        console.error('Status load failed', e);
      }
    }

    load();
    setInterval(load, 30_000);
  </script>
</body>
</html>
